name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-version-sync:
    name: Verify Version Sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Verify package/catalog/tag version alignment
        shell: bash
        run: |
          node --input-type=module <<'EOF'
          import fs from 'node:fs';
          import path from 'node:path';

          const root = process.cwd();
          const pkg = JSON.parse(fs.readFileSync(path.join(root, 'package.json'), 'utf8'));
          const manifest = JSON.parse(fs.readFileSync(path.join(root, 'src', 'catalog', 'manifest.json'), 'utf8'));
          const tag = process.env.GITHUB_REF_NAME;
          const problems = [];

          if (pkg.version !== manifest.catalogVersion) {
            problems.push(`package.json version (${pkg.version}) does not match catalogVersion (${manifest.catalogVersion})`);
          }

          if (tag && tag !== `v${pkg.version}`) {
            problems.push(`release tag (${tag}) does not match package.json version (v${pkg.version})`);
          }

          if (problems.length > 0) {
            for (const problem of problems) console.error(`[version-sync] ${problem}`);
            process.exit(1);
          }

          console.log(`[version-sync] OK package=${pkg.version} catalog=${manifest.catalogVersion} tag=${tag ?? ''}`.trim());
          EOF

  quality:
    name: Release Quality Gates
    runs-on: ubuntu-latest
    needs: [verify-version-sync]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run lint
      - run: npm test

  smoke-packed-install:
    name: Release Packed Install Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [quality]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run smoke:packed-install

  publish-npm:
    name: Publish npm Package
    runs-on: ubuntu-latest
    needs: [smoke-packed-install]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm pack --dry-run
      - run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish GitHub Release Notes
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_BODY.md
